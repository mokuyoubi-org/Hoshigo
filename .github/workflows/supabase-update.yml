name: Supabase Update

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      # ──────────────────────────────────────────────
      # 1. DEVから「スキーマ定義のみ」をダンプ
      # ──────────────────────────────────────────────
      - name: Dump dev schema (structure only)
        run: |
          # 古いファイルを全削除して常に最新1ファイルだけ残す
          rm -rf supabase/migrations/
          mkdir -p supabase/migrations/
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          supabase db dump \
            --db-url "${{ secrets.SUPABASE_DB_URL_DEV }}" \
            --schema public,system,game,users \
            -f supabase/migrations/${TIMESTAMP}_schema_only.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ──────────────────────────────────────────────
      # 2. DEVとPRODを比較して差分DDLを生成
      #    削除系: DROP FUNCTION / DROP TRIGGER / DROP VIEW / DROP COLUMN
      #    テーブル丸ごとDROPは警告のみ（実行しない）
      # ──────────────────────────────────────────────
      - name: Generate diff DDL (safe - no DROP TABLE)
        run: |
          python3 - <<'PYEOF'
          import subprocess, os, re

          DEV_URL  = os.environ["SUPABASE_DB_URL_DEV"]
          PROD_URL = os.environ["SUPABASE_DB_URL_PROD"]
          OUT      = "supabase/migrations/diff_apply.sql"

          def query(url, sql):
              r = subprocess.run(
                  ["psql", url, "-At", "-c", sql],
                  capture_output=True, text=True, check=True
              )
              return {row for row in r.stdout.strip().splitlines() if row}

          SCHEMAS   = ("public", "system", "game", "users")
          schema_in = "'" + "','".join(SCHEMAS) + "'"

          lines    = ["-- Auto-generated diff DDL (data-safe)\n", "BEGIN;\n\n"]
          warnings = []

          # ── Functions / Procedures ─────────────────
          sql_funcs = (
              f"SELECT n.nspname||'.'||p.proname"
              f"||'('||pg_get_function_identity_arguments(p.oid)||')' "
              f"FROM pg_proc p JOIN pg_namespace n ON n.oid=p.pronamespace "
              f"WHERE n.nspname IN ({schema_in}) AND p.prokind IN ('f','p')"
          )
          for fn in sorted(query(PROD_URL, sql_funcs) - query(DEV_URL, sql_funcs)):
              lines.append(f"DROP FUNCTION IF EXISTS {fn} CASCADE;\n")

          # ── Triggers ───────────────────────────────
          sql_trg = (
              f"SELECT trigger_schema||'.'||trigger_name||'@'||event_object_table "
              f"FROM information_schema.triggers "
              f"WHERE trigger_schema IN ({schema_in})"
          )
          for t in sorted(query(PROD_URL, sql_trg) - query(DEV_URL, sql_trg)):
              schema_name, rest = t.split(".", 1)
              trg_name, tbl     = rest.split("@", 1)
              lines.append(f"DROP TRIGGER IF EXISTS {trg_name} ON {schema_name}.{tbl} CASCADE;\n")

          # ── Views ──────────────────────────────────
          sql_view = (
              f"SELECT table_schema||'.'||table_name FROM information_schema.views "
              f"WHERE table_schema IN ({schema_in})"
          )
          for v in sorted(query(PROD_URL, sql_view) - query(DEV_URL, sql_view)):
              lines.append(f"DROP VIEW IF EXISTS {v} CASCADE;\n")

          # ── Tables: DROP は警告のみ ─────────────────
          sql_tbl = (
              f"SELECT table_schema||'.'||table_name FROM information_schema.tables "
              f"WHERE table_schema IN ({schema_in}) AND table_type='BASE TABLE'"
          )
          for t in sorted(query(PROD_URL, sql_tbl) - query(DEV_URL, sql_tbl)):
              warnings.append(f"Table '{t}' exists in PROD but not in DEV. Manual DROP required if intended.")

          # ── Columns: 削除 ──────────────────────────
          sql_col = (
              f"SELECT table_schema||'.'||table_name||'.'||column_name "
              f"FROM information_schema.columns "
              f"WHERE table_schema IN ({schema_in})"
          )
          for c in sorted(query(PROD_URL, sql_col) - query(DEV_URL, sql_col)):
              parts      = c.rsplit(".", 1)
              tbl, col   = parts[0], parts[1]
              # そのテーブルが両方に存在する場合のみ DROP COLUMN を発行
              # (テーブル自体がPRODにしかない場合は上の警告で対応済み)
              lines.append(f"ALTER TABLE IF EXISTS {tbl} DROP COLUMN IF EXISTS {col};\n")

          lines.append("\nCOMMIT;\n")

          with open(OUT, "w") as f:
              f.writelines(lines)

          for w in warnings:
              print(f"::warning::{w}")

          print(f"Diff DDL written to {OUT}")
          PYEOF
        env:
          SUPABASE_DB_URL_DEV:  ${{ secrets.SUPABASE_DB_URL_DEV }}
          SUPABASE_DB_URL_PROD: ${{ secrets.SUPABASE_DB_URL_PROD }}

      # ──────────────────────────────────────────────
      # 3. DEVスキーマを安全な形に変換
      #    (DROP TABLE/TRUNCATE/DELETE除去、IF NOT EXISTS付与)
      # ──────────────────────────────────────────────
      - name: Extract safe DDL from dev dump
        run: |
          DUMP_FILE=$(ls -t supabase/migrations/*_schema_only.sql | head -1)
          SAFE_FILE="${DUMP_FILE%.sql}_safe.sql"

          python3 - <<'PYEOF' "$DUMP_FILE" "$SAFE_FILE"
          import sys, re

          src, dst = sys.argv[1], sys.argv[2]

          with open(src, "r", encoding="utf-8") as f:
              content = f.read()

          def wrap_identity_blocks(text):
              """ADD GENERATED AS IDENTITY (...SEQUENCE NAME...) ブロックを
              シーケンス重複エラー回避のため DO $$ IF NOT EXISTS $$ でラップする"""
              import re as _re
              result = []
              i = 0
              while i < len(text):
                  stmt_start = i
                  depth = 0
                  in_str = False
                  stmt_end = -1
                  while i < len(text):
                      ch = text[i]
                      if ch == "\'" and not in_str:
                          in_str = True
                      elif ch == "\'" and in_str:
                          in_str = False
                      elif ch == '(' and not in_str:
                          depth += 1
                      elif ch == ')' and not in_str:
                          depth -= 1
                      elif ch == ';' and not in_str and depth == 0:
                          stmt_end = i
                          i += 1
                          break
                      i += 1
                  if stmt_end == -1:
                      result.append(text[stmt_start:])
                      break
                  stmt = text[stmt_start:stmt_end+1]
                  if _re.search(r'ADD GENERATED\b', stmt, _re.IGNORECASE) and \
                     _re.search(r'SEQUENCE NAME', stmt, _re.IGNORECASE):
                      m = _re.search(
                          r'SEQUENCE NAME\s+"?([^"\s.]+)"?\.?"?([^"\s;)]+)"?',
                          stmt, _re.IGNORECASE
                      )
                      if m:
                          seq_schema = m.group(1)
                          seq_name   = m.group(2)
                          wrapped = (
                              f"DO $identity_guard$\n"
                              f"BEGIN\n"
                              f"  IF NOT EXISTS (\n"
                              f"    SELECT 1 FROM pg_sequences\n"
                              f"    WHERE schemaname = '{seq_schema}' AND sequencename = '{seq_name}'\n"
                              f"  ) THEN\n"
                              f"    {stmt.strip()}\n"
                              f"  END IF;\n"
                              f"END $identity_guard$;\n"
                          )
                          result.append(wrapped)
                          continue
                  result.append(stmt)
              return "".join(result)

          output = []
          for line in content.splitlines(keepends=True):
              if re.match(r'^\s*(DROP\s+TABLE|TRUNCATE|DELETE\s+FROM|DROP\s+SCHEMA)', line, re.IGNORECASE):
                  continue
              line = re.sub(r'\bCREATE TABLE\b(?!\s+IF\s+NOT\s+EXISTS)',         'CREATE TABLE IF NOT EXISTS',         line, flags=re.IGNORECASE)
              line = re.sub(r'\bCREATE SEQUENCE\b(?!\s+IF\s+NOT\s+EXISTS)',       'CREATE SEQUENCE IF NOT EXISTS',      line, flags=re.IGNORECASE)
              line = re.sub(r'\bCREATE SCHEMA\b(?!\s+IF\s+NOT\s+EXISTS)',         'CREATE SCHEMA IF NOT EXISTS',        line, flags=re.IGNORECASE)
              line = re.sub(r'\bCREATE INDEX\b(?!\s+IF\s+NOT\s+EXISTS)(?!\s+CONCURRENTLY)', 'CREATE INDEX IF NOT EXISTS', line, flags=re.IGNORECASE)
              line = re.sub(r'\bCREATE UNIQUE INDEX\b(?!\s+IF\s+NOT\s+EXISTS)',   'CREATE UNIQUE INDEX IF NOT EXISTS',  line, flags=re.IGNORECASE)
              # CREATE TYPE → IF NOT EXISTS（Enum値の変更は破壊的なのでスキップのみ）
              line = re.sub(r'\bCREATE TYPE\b(?!\s+IF\s+NOT\s+EXISTS)',            'CREATE TYPE IF NOT EXISTS',          line, flags=re.IGNORECASE)
              # CREATE TRIGGER → CREATE OR REPLACE TRIGGER（PG14以降、Supabaseは対応済み）
              line = re.sub(r'\bCREATE TRIGGER\b(?!\s+OR\s+REPLACE)',               'CREATE OR REPLACE TRIGGER',          line, flags=re.IGNORECASE)
              output.append(line)

          result = "".join(output)
          result = re.sub(r'(ALTER TABLE[^;]+ADD COLUMN)\s+(?!IF\s+NOT\s+EXISTS)', r'\1 IF NOT EXISTS ', result, flags=re.IGNORECASE)
          result = wrap_identity_blocks(result)

          # ADD CONSTRAINT (PRIMARY KEY / UNIQUE / FOREIGN KEY / CHECK) を
          # 制約名が既に存在する場合スキップするよう DO $$ でラップ
          def wrap_constraint_blocks(text):
              import re as _re
              result = []
              i = 0
              while i < len(text):
                  stmt_start = i
                  depth = 0
                  in_str = False
                  stmt_end = -1
                  while i < len(text):
                      ch = text[i]
                      if ch == "'" and not in_str:
                          in_str = True
                      elif ch == "'" and in_str:
                          in_str = False
                      elif ch == '(' and not in_str:
                          depth += 1
                      elif ch == ')' and not in_str:
                          depth -= 1
                      elif ch == ';' and not in_str and depth == 0:
                          stmt_end = i
                          i += 1
                          break
                      i += 1
                  if stmt_end == -1:
                      result.append(text[stmt_start:])
                      break
                  stmt = text[stmt_start:stmt_end+1]
                  # ADD CONSTRAINT <name> PRIMARY KEY / UNIQUE / FOREIGN KEY / CHECK
                  m = _re.search(
                      r'ADD CONSTRAINT\s+"?([^"\s]+)"?\s+(PRIMARY KEY|UNIQUE|FOREIGN KEY|CHECK)\b',
                      stmt, _re.IGNORECASE
                  )
                  if m:
                      constraint_name = m.group(1)
                      # テーブル名を取得（schema.table 形式）
                      tm = _re.search(
                          r'ALTER TABLE\s+(?:ONLY\s+)?"?([^"\s]+)"?\."?([^"\s]+)"?',
                          stmt, _re.IGNORECASE
                      )
                      if tm:
                          tbl_schema = tm.group(1)
                          tbl_name   = tm.group(2)
                          wrapped = (
                              f"DO $constraint_guard$\n"
                              f"BEGIN\n"
                              f"  IF NOT EXISTS (\n"
                              f"    SELECT 1 FROM pg_constraint c\n"
                              f"    JOIN pg_namespace n ON n.oid = c.connamespace\n"
                              f"    WHERE n.nspname = '{tbl_schema}'\n"
                              f"      AND c.conname = '{constraint_name}'\n"
                              f"  ) THEN\n"
                              f"    {stmt.strip()}\n"
                              f"  END IF;\n"
                              f"END $constraint_guard$;\n"
                          )
                          result.append(wrapped)
                          continue
                  result.append(stmt)
              return "".join(result)

          result = wrap_constraint_blocks(result)

          # CREATE POLICY を DROP IF EXISTS + CREATE OR REPLACE で冪等化
          # pg_dump は CREATE POLICY を出力するが IF NOT EXISTS がないため
          def wrap_policy_blocks(text):
              import re as _re
              result = []
              i = 0
              while i < len(text):
                  stmt_start = i
                  depth = 0
                  in_str = False
                  stmt_end = -1
                  while i < len(text):
                      ch = text[i]
                      if ch == "'" and not in_str:
                          in_str = True
                      elif ch == "'" and in_str:
                          in_str = False
                      elif ch == '(' and not in_str:
                          depth += 1
                      elif ch == ')' and not in_str:
                          depth -= 1
                      elif ch == ';' and not in_str and depth == 0:
                          stmt_end = i
                          i += 1
                          break
                      i += 1
                  if stmt_end == -1:
                      result.append(text[stmt_start:])
                      break
                  stmt = text[stmt_start:stmt_end+1]
                  m = _re.match(
                      r'\s*CREATE POLICY\s+"?([^"\s]+)"?\s+ON\s+"?([^"\s.]+)"?\."?([^"\s]+)"?',
                      stmt, _re.IGNORECASE
                  )
                  if m:
                      policy_name = m.group(1)
                      tbl_schema  = m.group(2)
                      tbl_name    = m.group(3)
                      drop = f"DROP POLICY IF EXISTS \"{policy_name}\" ON \"{tbl_schema}\".\"{tbl_name}\";"
                      result.append(f"{drop}\n{stmt.strip()}\n")
                      continue
                  result.append(stmt)
              return "".join(result)

          result = wrap_policy_blocks(result)

          with open(dst, "w", encoding="utf-8") as f:
              f.write(result)

          print(f"Safe DDL written to {dst}")
          PYEOF

      # ──────────────────────────────────────────────
      # 4. Edge Functions をDEVからダウンロード
      # ──────────────────────────────────────────────
      - name: Download dev edge functions
        run: |
          rm -rf supabase/functions/
          mkdir -p supabase/functions/
          supabase functions download \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF_DEV }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ──────────────────────────────────────────────
      # 5. コミット & プッシュ
      # ──────────────────────────────────────────────
      - name: Commit and push
        run: |
          # 中間ファイル（生ダンプ）を削除してsafe.sqlとdiff_apply.sqlだけ残す
          rm -f supabase/migrations/*_schema_only.sql
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/ supabase/functions/
          git diff --staged --quiet || git commit -m "chore: promote dev schema (safe) and functions to production"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ──────────────────────────────────────────────
      # 6. PRODのフルバックアップをSupabase Storageに保存
      #    （データ含む、最新1ファイルのみ保持）
      # ──────────────────────────────────────────────
      - name: Backup prod database to Supabase Storage
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BACKUP_FILE="/tmp/prod_backup_${TIMESTAMP}.sql"

          # フルダンプ（スキーマ＋データ）
          pg_dump "${{ secrets.SUPABASE_DB_URL_PROD }}"             --schema public,system,game,users             -f "$BACKUP_FILE"

          # 古いバックアップを削除してから新しいものをアップロード
          # Supabase Storage REST API を使用
          STORAGE_URL="${{ secrets.SUPABASE_URL_PROD }}/storage/v1/object"
          AUTH_HEADER="Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PROD }}"
          BUCKET="backups"
          OBJECT_NAME="db/latest_backup.sql"

          # バケットが存在しない場合は作成
          curl -s -X POST             "${{ secrets.SUPABASE_URL_PROD }}/storage/v1/bucket"             -H "$AUTH_HEADER"             -H "Content-Type: application/json"             -d '{"id":"backups","name":"backups","public":false}'             || true  # 既に存在する場合はエラーを無視

          # 既存ファイルを削除
          curl -s -X DELETE             "${STORAGE_URL}/${BUCKET}/${OBJECT_NAME}"             -H "$AUTH_HEADER"             || true  # 存在しない場合はエラーを無視

          # 新しいバックアップをアップロード
          curl -s -X POST             "${STORAGE_URL}/${BUCKET}/${OBJECT_NAME}"             -H "$AUTH_HEADER"             -H "Content-Type: application/octet-stream"             --data-binary "@${BACKUP_FILE}"             --fail

          echo "Backup uploaded to Supabase Storage: ${BUCKET}/${OBJECT_NAME}"
          rm -f "$BACKUP_FILE"

      # ──────────────────────────────────────────────
      # 7. 差分DDL適用（削除系: DROP FUNCTION/TRIGGER/VIEW/COLUMN）
      # ──────────────────────────────────────────────
      - name: Apply diff DDL to production (deletions)
        run: |
          psql "${{ secrets.SUPABASE_DB_URL_PROD }}" \
            --single-transaction \
            --set ON_ERROR_STOP=1 \
            -f supabase/migrations/diff_apply.sql

      # ──────────────────────────────────────────────
      # 8. DEVスキーマを本番に適用（追加・更新系）
      # ──────────────────────────────────────────────
      - name: Apply safe schema to production (additions/updates)
        run: |
          SAFE_FILE=$(ls -t supabase/migrations/*_safe.sql | head -1)
          psql "${{ secrets.SUPABASE_DB_URL_PROD }}" \
            --single-transaction \
            --set ON_ERROR_STOP=1 \
            -f "$SAFE_FILE"

      # ──────────────────────────────────────────────
      # 9. Edge Functions: 全削除 → 再デプロイ（DEVで消したものも消える）
      # ──────────────────────────────────────────────
      - name: Delete all prod edge functions
        run: |
          supabase functions list \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}" \
            --output json \
            | jq -r '.[].name' \
            | while read fn; do
                echo "Deleting $fn"
                supabase functions delete "$fn" \
                  --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}" \
                  --yes
              done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions to production
        run: |
          cd supabase
          supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}