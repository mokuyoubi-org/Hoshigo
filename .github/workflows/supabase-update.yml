name: Supabase Update

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      # ──────────────────────────────────────────────
      # 1. PROD・DEVのフルバックアップをCloudflare R2に保存
      #    （各環境ごとに最新10件を保持、超えた分は古い順に削除）
      # ──────────────────────────────────────────────
      - name: Backup databases to Cloudflare R2
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          MAX_BACKUPS=10
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          pip install awscli --quiet
          export AWS_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}"
          export AWS_DEFAULT_REGION="auto"

          backup_and_rotate() {
            local DB_URL=$1
            local FOLDER=$2
            local BACKUP_FILE="/tmp/${FOLDER}_backup_${TIMESTAMP}.sql"
            local OBJECT_KEY="${FOLDER}/${FOLDER}_backup_${TIMESTAMP}.sql"

            /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" -f "$BACKUP_FILE"

            aws s3 cp "$BACKUP_FILE" "s3://${BUCKET}/${OBJECT_KEY}" \
              --endpoint-url "$ENDPOINT"

            echo "Backup uploaded: ${OBJECT_KEY}"
            rm -f "$BACKUP_FILE"

            aws s3 ls "s3://${BUCKET}/${FOLDER}/" \
              --endpoint-url "$ENDPOINT" \
              | sort \
              | awk '{print $4}' \
              | grep "^${FOLDER}_backup_" \
              | head -n -${MAX_BACKUPS} \
              | while read KEY_NAME; do
                  aws s3 rm "s3://${BUCKET}/${FOLDER}/${KEY_NAME}" \
                    --endpoint-url "$ENDPOINT"
                  echo "Deleted old backup: ${FOLDER}/${KEY_NAME}"
                done
          }

          backup_and_rotate "${{ secrets.SUPABASE_DB_URL_PROD }}" "prod"
          backup_and_rotate "${{ secrets.SUPABASE_DB_URL_DEV }}"  "dev"

      # ──────────────────────────────────────────────
      # 2. DEVとPRODを比較して削除系DDLを生成
      #    DEVから消えたものをPRODからも削除する
      # ──────────────────────────────────────────────
      - name: Generate deletion DDL from diff
        run: python3 .github/scripts/generate_deletion_ddl.py
        env:
          SUPABASE_DB_URL_DEV: ${{ secrets.SUPABASE_DB_URL_DEV }}
          SUPABASE_DB_URL_PROD: ${{ secrets.SUPABASE_DB_URL_PROD }}

      # ──────────────────────────────────────────────
      # 3. DEVから「スキーマ定義のみ」をダンプ
      # ──────────────────────────────────────────────
      - name: Dump dev schema (structure only)
        run: |
          rm -rf supabase/migrations/
          mkdir -p supabase/migrations/
          # ステップ2で生成した削除DDLをmigrationsフォルダに移動
          mv /tmp/diff_deletions.sql supabase/migrations/diff_deletions.sql
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          supabase db dump \
            --db-url "${{ secrets.SUPABASE_DB_URL_DEV }}" \
            --schema public,system,game,users \
            -f supabase/migrations/${TIMESTAMP}_schema_only.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ──────────────────────────────────────────────
      # 4. ダンプを冪等なSQLに変換
      #    pg_dumpは「空DBへの流し込み」前提で書かれているため
      #    既存DBに安全に適用できる形に変換する
      # ──────────────────────────────────────────────
      - name: Convert dump to idempotent SQL
        run: |
          DUMP_FILE=$(ls -t supabase/migrations/*_schema_only.sql | head -1)
          SAFE_FILE="${DUMP_FILE%.sql}_safe.sql"
          python3 .github/scripts/convert_to_idempotent.py "$DUMP_FILE" "$SAFE_FILE"

      # ──────────────────────────────────────────────
      # 5. 中間ファイルを削除してコミット & プッシュ
      #    リポジトリには safe.sql と diff_deletions.sql のみ残す
      # ──────────────────────────────────────────────
      - name: Commit and push
        run: |
          rm -f supabase/migrations/*_schema_only.sql
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/
          git diff --staged --quiet || git commit -m "chore: promote dev schema to production"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ──────────────────────────────────────────────
      # 6. 削除系DDLをPRODに適用
      #    DEVから消えた関数・トリガー・ビュー・ポリシー・カラム・テーブルを削除
      # ──────────────────────────────────────────────
      - name: Apply deletion DDL to production
        run: |
          psql "${{ secrets.SUPABASE_DB_URL_PROD }}" \
            --single-transaction \
            --set ON_ERROR_STOP=1 \
            -f supabase/migrations/diff_deletions.sql

      # ──────────────────────────────────────────────
      # 7. スキーマをPRODに適用
      # ──────────────────────────────────────────────
      - name: Apply schema to production
        run: |
          SAFE_FILE=$(ls -t supabase/migrations/*_safe.sql | head -1)
          psql "${{ secrets.SUPABASE_DB_URL_PROD }}" \
            --single-transaction \
            --set ON_ERROR_STOP=1 \
            -f "$SAFE_FILE"
