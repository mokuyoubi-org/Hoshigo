name: Supabase Update

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link dev project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF_DEV }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Dump dev schema
        run: |
          rm -rf supabase/migrations/
          mkdir -p supabase/migrations/
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          supabase db dump \
            --db-url "${{ secrets.SUPABASE_DB_URL_DEV }}" \
            -f supabase/migrations/${TIMESTAMP}_remote_schema.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Download dev edge functions
        run: |
          rm -rf supabase/functions/
          mkdir -p supabase/functions/
          cd supabase
          supabase functions download
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/ supabase/functions/
          git diff --staged --quiet || git commit -m "chore: promote dev schema and functions to production"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push schema to production
        run: |
          MIGRATION_FILE=$(ls supabase/migrations/*.sql | head -1)
          
          # 本番DBの独自スキーマをリセット
          psql "${{ secrets.SUPABASE_DB_URL_PROD }}" -c "
            DROP SCHEMA IF EXISTS public CASCADE;
            CREATE SCHEMA public;
            DROP SCHEMA IF EXISTS system CASCADE;
            DROP SCHEMA IF EXISTS game CASCADE;
            DROP SCHEMA IF EXISTS users CASCADE;
          "
          
          # スキーマを流し込む
          psql "${{ secrets.SUPABASE_DB_URL_PROD }}" -f "$MIGRATION_FILE"

      - name: Link prod project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions to production
        run: |
          cd supabase
          supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}