name: Supabase Safe Full Sync (EF + PostgreSQL)

on:
  workflow_dispatch:

jobs:
  sync-ef-and-rpc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. コードをチェックアウト
      - uses: actions/checkout@v4

      # 2. supabase CLI をセットアップ
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # 3. dev の Edge Functions をダウンロード
      - name: Download dev edge functions
        run: |
          rm -rf supabase/functions/
          mkdir -p supabase/functions/
          supabase functions download \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF_DEV }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 4. dev に存在しない EF を本番から削除
      - name: Delete functions removed in dev
        run: |
          PROD_FUNCS=$(supabase functions list \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}" \
            --output json | jq -r '.[].name')

          for fn in $PROD_FUNCS; do
            if [ ! -d "supabase/functions/$fn" ]; then
              echo "Deleting $fn (not in dev)"
              supabase functions delete "$fn" \
                --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}" \
                --yes
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 5. dev の EF を本番にデプロイ
      - name: Deploy dev functions to prod
        run: |
          cd supabase
          supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 6. PostgreSQL 関数・トリガー・タイプ定義のみ本番に同期（データは触らない）
      - name: Deploy dev PostgreSQL RPC & triggers to prod
        run: |
          # 最新の dev マイグレーション SQL ファイルを選択
          RPC_FILE=$(ls -t supabase/migrations/*_remote_schema.sql | head -1)

          echo "Applying PostgreSQL functions, triggers, and types from $RPC_FILE to prod..."
          # 本番 DB に流す（データは untouched）
          psql "${{ secrets.SUPABASE_DB_URL_PROD }}" -f "$RPC_FILE"
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
