name: Supabase Update

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      # ──────────────────────────────────────────────
      # 1. PRODのフルバックアップをSupabase Storageに保存
      #    （最新1ファイルのみ保持）
      # ──────────────────────────────────────────────
      - name: Backup prod database to Supabase Storage
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BACKUP_FILE="/tmp/prod_backup_${TIMESTAMP}.sql"
          MAX_BACKUPS=10

          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.SUPABASE_DB_URL_PROD }}" \
            -f "$BACKUP_FILE"

          KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PROD }}"
          STORAGE_URL="${{ secrets.SUPABASE_URL_PROD }}/storage/v1/object"
          LIST_URL="${{ secrets.SUPABASE_URL_PROD }}/storage/v1/object/list"
          BUCKET="backups"
          OBJECT_NAME="db/prod_backup_${TIMESTAMP}.sql"

          # バケットが存在しない場合は作成
          curl -s -X POST \
            "${{ secrets.SUPABASE_URL_PROD }}/storage/v1/bucket" \
            -H "apikey: ${KEY}" \
            -H "Authorization: Bearer ${KEY}" \
            -H "Content-Type: application/json" \
            -d '{"id":"backups","name":"backups","public":false}' \
            || true

          # 新しいバックアップをアップロード
          curl -s -X POST \
            "${STORAGE_URL}/${BUCKET}/${OBJECT_NAME}" \
            -H "apikey: ${KEY}" \
            -H "Authorization: Bearer ${KEY}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@${BACKUP_FILE}" \
            --fail

          echo "Backup uploaded: ${OBJECT_NAME}"
          rm -f "$BACKUP_FILE"

          # db/ フォルダ内のファイル一覧を取得し、古いものを削除（10件超え分）
          FILES=$(curl -s -X POST \
            "${LIST_URL}/${BUCKET}" \
            -H "apikey: ${KEY}" \
            -H "Authorization: Bearer ${KEY}" \
            -H "Content-Type: application/json" \
            -d '{"prefix":"db/","limit":100,"sortBy":{"column":"name","order":"asc"}}')

          # ファイル名を古い順に並べて10件を超えた分を削除
          echo "$FILES" | python3 - <<'PYEOF'
          import sys, json, subprocess, os

          files = json.loads(sys.stdin.read())
          names = sorted([f["name"] for f in files if f["name"].startswith("prod_backup_")])

          max_backups = int(os.environ.get("MAX_BACKUPS", 10))
          to_delete = names[:-max_backups] if len(names) > max_backups else []

          key  = os.environ["KEY"]
          base = os.environ["SUPABASE_URL_PROD"]
          bucket = "backups"

          for name in to_delete:
              url = f"{base}/storage/v1/object/{bucket}/db/{name}"
              r = subprocess.run([
                  "curl", "-s", "-X", "DELETE", url,
                  "-H", f"apikey: {key}",
                  "-H", f"Authorization: Bearer {key}",
              ], capture_output=True, text=True)
              print(f"Deleted old backup: db/{name}")
          PYEOF
        env:
          KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PROD }}
          SUPABASE_URL_PROD: ${{ secrets.SUPABASE_URL_PROD }}
          MAX_BACKUPS: 10

      # ──────────────────────────────────────────────
      # 2. DEVから「スキーマ定義のみ」をダンプ
      # ──────────────────────────────────────────────
      - name: Dump dev schema (structure only)
        run: |
          rm -rf supabase/migrations/
          mkdir -p supabase/migrations/
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          supabase db dump \
            --db-url "${{ secrets.SUPABASE_DB_URL_DEV }}" \
            --schema public,system,game,users \
            -f supabase/migrations/${TIMESTAMP}_schema_only.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ──────────────────────────────────────────────
      # 3. ダンプを冪等なSQLに変換
      #    pg_dumpは「空DBへの流し込み」前提で書かれているため
      #    既存DBに安全に適用できる形に変換する
      # ──────────────────────────────────────────────
      - name: Convert dump to idempotent SQL
        run: |
          DUMP_FILE=$(ls -t supabase/migrations/*_schema_only.sql | head -1)
          SAFE_FILE="${DUMP_FILE%.sql}_safe.sql"

          python3 - <<'PYEOF' "$DUMP_FILE" "$SAFE_FILE"
          import sys, re

          src, dst = sys.argv[1], sys.argv[2]

          with open(src, "r", encoding="utf-8") as f:
              content = f.read()

          # ── 行単位の変換 ───────────────────────────
          output = []
          for line in content.splitlines(keepends=True):
              line = re.sub(r'\bCREATE TABLE\b(?!\s+IF\s+NOT\s+EXISTS)',          'CREATE TABLE IF NOT EXISTS',         line, flags=re.IGNORECASE)
              line = re.sub(r'\bCREATE SEQUENCE\b(?!\s+IF\s+NOT\s+EXISTS)',        'CREATE SEQUENCE IF NOT EXISTS',      line, flags=re.IGNORECASE)
              line = re.sub(r'\bCREATE SCHEMA\b(?!\s+IF\s+NOT\s+EXISTS)',          'CREATE SCHEMA IF NOT EXISTS',        line, flags=re.IGNORECASE)
              line = re.sub(r'\bCREATE INDEX\b(?!\s+IF\s+NOT\s+EXISTS)(?!\s+CONCURRENTLY)', 'CREATE INDEX IF NOT EXISTS', line, flags=re.IGNORECASE)
              line = re.sub(r'\bCREATE UNIQUE INDEX\b(?!\s+IF\s+NOT\s+EXISTS)',    'CREATE UNIQUE INDEX IF NOT EXISTS',  line, flags=re.IGNORECASE)
              line = re.sub(r'\bCREATE TYPE\b(?!\s+IF\s+NOT\s+EXISTS)',            'CREATE TYPE IF NOT EXISTS',          line, flags=re.IGNORECASE)
              line = re.sub(r'\bCREATE TRIGGER\b(?!\s+OR\s+REPLACE)',              'CREATE OR REPLACE TRIGGER',          line, flags=re.IGNORECASE)
              output.append(line)

          result = "".join(output)

          # ── ADD COLUMN → IF NOT EXISTS ─────────────
          result = re.sub(
              r'(ALTER TABLE[^;]+ADD COLUMN)\s+(?!IF\s+NOT\s+EXISTS)',
              r'\1 IF NOT EXISTS ', result, flags=re.IGNORECASE
          )

          # ── ADD GENERATED AS IDENTITY: DO $$ でラップ ──
          def wrap_blocks(text, detect_fn, wrap_fn):
              """文単位でテキストを走査し、detect_fnが真の文をwrap_fnで変換する"""
              import re as _re
              result = []
              i = 0
              while i < len(text):
                  stmt_start = i
                  depth, in_str, stmt_end = 0, False, -1
                  while i < len(text):
                      ch = text[i]
                      if ch == "'" and not in_str:   in_str = True
                      elif ch == "'" and in_str:     in_str = False
                      elif ch == '(' and not in_str: depth += 1
                      elif ch == ')' and not in_str: depth -= 1
                      elif ch == ';' and not in_str and depth == 0:
                          stmt_end = i; i += 1; break
                      i += 1
                  if stmt_end == -1:
                      result.append(text[stmt_start:]); break
                  stmt = text[stmt_start:stmt_end+1]
                  wrapped = wrap_fn(stmt)
                  result.append(wrapped if wrapped is not None else stmt)
              return "".join(result)

          def wrap_identity(stmt):
              import re as _re
              if not (_re.search(r'ADD GENERATED\b', stmt, _re.IGNORECASE) and
                      _re.search(r'SEQUENCE NAME', stmt, _re.IGNORECASE)):
                  return None
              m = _re.search(r'SEQUENCE NAME\s+"?([^"\s.]+)"?\.?"?([^"\s;)]+)"?', stmt, _re.IGNORECASE)
              if not m: return None
              return (
                  f"DO $identity_guard$\nBEGIN\n"
                  f"  IF NOT EXISTS (\n    SELECT 1 FROM pg_sequences\n"
                  f"    WHERE schemaname = '{m.group(1)}' AND sequencename = '{m.group(2)}'\n"
                  f"  ) THEN\n    {stmt.strip()}\n  END IF;\n"
                  f"END $identity_guard$;\n"
              )

          def wrap_constraint(stmt):
              import re as _re
              m = _re.search(r'ADD CONSTRAINT\s+"?([^"\s]+)"?\s+(PRIMARY KEY|UNIQUE|FOREIGN KEY|CHECK)\b', stmt, _re.IGNORECASE)
              if not m: return None
              tm = _re.search(r'ALTER TABLE\s+(?:ONLY\s+)?"?([^"\s]+)"?\."?([^"\s]+)"?', stmt, _re.IGNORECASE)
              if not tm: return None
              return (
                  f"DO $constraint_guard$\nBEGIN\n"
                  f"  IF NOT EXISTS (\n    SELECT 1 FROM pg_constraint c\n"
                  f"    JOIN pg_namespace n ON n.oid = c.connamespace\n"
                  f"    WHERE n.nspname = '{tm.group(1)}' AND c.conname = '{m.group(1)}'\n"
                  f"  ) THEN\n    {stmt.strip()}\n  END IF;\n"
                  f"END $constraint_guard$;\n"
              )

          def wrap_policy(stmt):
              import re as _re
              m = _re.match(r'\s*CREATE POLICY\s+"?([^"\s]+)"?\s+ON\s+"?([^"\s.]+)"?\."?([^"\s]+)"?', stmt, _re.IGNORECASE)
              if not m: return None
              drop = f'DROP POLICY IF EXISTS "{m.group(1)}" ON "{m.group(2)}"."{m.group(3)}";'
              return f"{drop}\n{stmt.strip()}\n"

          result = wrap_blocks(result, None, wrap_identity)
          result = wrap_blocks(result, None, wrap_constraint)
          result = wrap_blocks(result, None, wrap_policy)

          with open(dst, "w", encoding="utf-8") as f:
              f.write(result)

          print(f"Safe DDL written to {dst}")
          PYEOF

      # ──────────────────────────────────────────────
      # 4. Edge Functions をDEVからダウンロード
      # ──────────────────────────────────────────────
      - name: Download dev edge functions
        run: |
          rm -rf supabase/functions/
          mkdir -p supabase/functions/
          supabase functions download \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF_DEV }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ──────────────────────────────────────────────
      # 5. 中間ファイルを削除してコミット & プッシュ
      #    リポジトリには safe.sql のみ残す
      # ──────────────────────────────────────────────
      - name: Commit and push
        run: |
          rm -f supabase/migrations/*_schema_only.sql
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/ supabase/functions/
          git diff --staged --quiet || git commit -m "chore: promote dev schema and functions to production"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ──────────────────────────────────────────────
      # 6. スキーマをPRODに適用
      # ──────────────────────────────────────────────
      - name: Apply schema to production
        run: |
          SAFE_FILE=$(ls -t supabase/migrations/*_safe.sql | head -1)
          psql "${{ secrets.SUPABASE_DB_URL_PROD }}" \
            --single-transaction \
            --set ON_ERROR_STOP=1 \
            -f "$SAFE_FILE"

      # ──────────────────────────────────────────────
      # 7. Edge Functions: 全削除 → 再デプロイ
      # ──────────────────────────────────────────────
      - name: Delete all prod edge functions
        run: |
          supabase functions list \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}" \
            --output json \
            | jq -r '.[].name' \
            | while read fn; do
                echo "Deleting $fn"
                supabase functions delete "$fn" \
                  --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}" \
                  --yes
              done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions to production
        run: |
          cd supabase
          supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
