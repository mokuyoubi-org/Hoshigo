name: Supabase Safe Sync (EF + RPC)

on:
  workflow_dispatch:

jobs:
  sync-ef-and-rpc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. コードをチェックアウト
      - uses: actions/checkout@v4

      # 2. supabase CLI をセットアップ
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # 3. dev の Edge Functions をダウンロード
      - name: Download dev edge functions
        run: |
          rm -rf supabase/functions/
          mkdir -p supabase/functions/
          supabase functions download \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF_DEV }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 4. dev に存在しない EF を本番から削除
      - name: Delete functions removed in dev
        run: |
          PROD_FUNCS=$(supabase functions list \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}" \
            --output json | jq -r '.[].name')
          
          for fn in $PROD_FUNCS; do
            if [ ! -d "supabase/functions/$fn" ]; then
              echo "Deleting $fn (not in dev)"
              supabase functions delete "$fn" \
                --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}" \
                --yes
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 5. dev の EF を本番にデプロイ
      - name: Deploy dev functions to prod
        run: |
          cd supabase
          supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 6. dev の RPC SQL を本番に反映（データには触れない）
      - name: Deploy dev RPCs to prod
        run: |
          mkdir -p supabase/functions/sql
          # dev 側の RPC SQL ファイルをコピーする想定
          # 例: cp ../dev_repo/sql/*.sql supabase/functions/sql/
          
          for sql_file in supabase/functions/sql/*.sql; do
            echo "Applying $sql_file to prod..."
            psql "${{ secrets.SUPABASE_DB_URL_PROD }}" -f "$sql_file"
          done
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}