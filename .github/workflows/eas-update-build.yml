name: Auto EAS Update / Build

on:
  push:
    branches:
      - main
    paths:
      - "expo/**"

jobs:
  update-or-build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_UPDATE_TOKEN }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
      EXPO_UPDATES_URL: ${{ secrets.EXPO_UPDATES_URL }}
      EXPO_PUBLIC_SLUG: ${{ secrets.EXPO_PUBLIC_SLUG }}
      EXPO_PUBLIC_NAME: ${{ secrets.EXPO_PUBLIC_NAME }}
      EXPO_PUBLIC_SCHEME: ${{ secrets.EXPO_PUBLIC_SCHEME }}
      EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
      IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
      ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
      EXPO_PUBLIC_HOSHIGO_APP_URL: ${{ secrets.EXPO_PUBLIC_HOSHIGO_APP_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: expo
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_UPDATE_TOKEN }}

      - name: Setup EAS config
        run: |
          mkdir -p $GITHUB_WORKSPACE/expo/.eas
          echo "{\"projectId\": \"${{ secrets.EAS_PROJECT_ID }}\"}" > $GITHUB_WORKSPACE/expo/.eas/config.json

      - name: Check fingerprint
        id: fingerprint
        uses: expo/expo-github-action/fingerprint@v8
        with:
          working-directory: expo

      - name: EAS Update (OTA)
        if: steps.fingerprint.outputs.fingerprint-diff == ''
        working-directory: expo
        run: eas update --branch production --message "${{ github.event.head_commit.message }}"

      - name: EAS Build (ストア提出)
        if: steps.fingerprint.outputs.fingerprint-diff != ''
        working-directory: expo
        run: eas build --platform android --profile production --auto-submit
